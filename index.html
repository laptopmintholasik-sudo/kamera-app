<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Kamera App</title>

  <style>
    body{
      font-family: Arial;
      text-align:center;
      margin-top:40px;
    }

    button{
      padding:12px 25px;
      font-size:18px;
      cursor:pointer;
    }

    video{
      width:500px;
      max-width:90%;
      border:2px solid #333;
      margin-top:20px;
      display:none;
    }
  </style>

</head>

<body>

<h1>Kamera App</h1>

<button id="btnKamera">
📷 Buka Kamera
</button>

<br><br>

<video id="video" autoplay playsinline></video>

<script>
const tombol = document.getElementById("btnKamera");
const video = document.getElementById("video");

tombol.onclick = async function () {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: false
    });

    video.srcObject = stream;
    video.style.display = "block";

  } catch (err) {
    alert("Kamera tidak bisa dibuka.\n\n" + err.message);
  }
};
  
</script>
</body>
</html>
