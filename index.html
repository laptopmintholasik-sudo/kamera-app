<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Kamera Profesional</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>📷 Kamera Profesional</h1>

    <p id="status">
        🔴 Kamera belum dibuka
    </p>

    <div class="card">

        <video
            id="video"
            autoplay
            playsinline>
        </video>

        <img
            id="hasilFoto">

    </div>

    <div class="tombol">

        <button id="btnKamera">
            📷 Buka Kamera
        </button>

        <button id="btnFoto" disabled>
            📸 Ambil Foto
        </button>

        <button id="btnUlang" disabled>
            🔄 Ulangi
        </button>

        <button id="btnSimpan" disabled>
            💾 Simpan
        </button>

    </div>

    <canvas id="canvas"></canvas>

</div>

<script src="script.js"></script>
<script src="app.js"></script>

</body>
</html>
